name: Build & Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install latex deps
      run: sudo apt-get install -y texlive-lang-italian texlive-latex-extra
    - name: Install typst
      run: |
        wget $(curl -s https://api.github.com/repos/typst/typst/releases/latest | grep browser_download_url |grep -E "x86.*linux" | cut -d '"' -f 4)
        sudo tar xf typst-x86_64-unknown-linux-musl.tar.xz -C /bin
    - name: Build sources
      run: python .github/workflows/build_latex.py
    - name: Build html
      run: python .github/workflows/build_html.py
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: "./build"

  page_deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: build
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: "."
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
